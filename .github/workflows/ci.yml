name: CI

# PR 및 main 외 브랜치 푸시에서 테스트/빌드를 검증한다.
on:
  pull_request:
  push:
    branches-ignore: [main]

# 최소 권한: 테스트/빌드는 코드 읽기만 필요
permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Run tests
        working-directory: readforest
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build
