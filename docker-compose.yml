services:
  backend:
    build:
      context: ./readforest
      dockerfile: Dockerfile
    image: readforest-backend
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-readforest}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_DDL_AUTO: ${SPRING_JPA_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      KAKAO_API_KEY: ${KAKAO_API_KEY}
      # OAuth2: .env 가 비어 있으면 더미값을 넣어 등록 검증만 통과시킨다(로그인 자체는 비활성).
      # 실제 소셜 로그인을 켜려면 .env 에 진짜 키를 채우면 그 값이 우선 적용된다.
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-disabled}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-disabled}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-disabled}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-disabled}
      OAUTH2_REDIRECT_URI: ${OAUTH2_REDIRECT_URI:-https://${DOMAIN}/oauth2/callback}
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "8080"
    networks:
      - web

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: readforest-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - web
    # 1) 공식 엔트리포인트의 템플릿 처리(envsubst)를 명시적으로 실행 → 우리 default.conf 렌더링
    # 2) 6시간마다 reload 하여 갱신된 인증서를 반영
    # 3) nginx 포그라운드 실행
    command: >
      /bin/sh -c "/docker-entrypoint.d/20-envsubst-on-templates.sh;
      (while :; do sleep 6h & wait $${!}; nginx -s reload; done) &
      exec nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # 12시간마다 갱신 시도 (만료 30일 이내일 때만 실제 갱신)
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

networks:
  web:
