spring.application.name=readforest

# .env 파일 불러오기
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:readforest/.env[.properties]

# MySQL Datasource Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:readforest}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
# 'update' will automatically create/update tables (e.g., 'notifications', 'files') based on your JPA Entities.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
