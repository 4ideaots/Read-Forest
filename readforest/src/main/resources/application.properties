spring.application.name=readforest

# .env 파일 불러오기
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:readforest/.env[.properties]

# MySQL Datasource Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:readforest}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
# 'update' will automatically create/update tables (e.g., 'notifications', 'files') based on your JPA Entities.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Kakao Book Search API
kakao.api.key=${KAKAO_API_KEY:your-kakao-rest-api-key}

# OAuth2 - Kakao
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:your-kakao-client-id}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:your-kakao-client-secret}
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# OAuth2 - GitHub
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# OAuth2 로그인 성공 후 프론트엔드 리다이렉트 URI
oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}

# JWT Configuration
jwt.secret=${JWT_SECRET:cmVhZGZvcmVzdC1qd3Qtc2VjcmV0LWtleS1taW5pbXVtLTI1Ni1iaXRzIQ==}
jwt.access-token-expiration=86400000
jwt.refresh-token-expiration=604800000
